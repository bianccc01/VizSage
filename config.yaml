# Configuration file for vision model fine-tuning

# Model configuration
model_name: "unsloth/Llama-3.2-11B-Vision-Instruct"
load_in_4bit: true
use_gradient_checkpointing: "unsloth"

# Fine-tuning parameters
finetune_vision_layers: false
finetune_language_layers: true
finetune_attention_modules: true
finetune_mlp_modules: true
lora_r: 16
lora_alpha: 16
lora_dropout: 0
lora_bias: "none"
random_state: 3407
use_rslora: false

# Dataset configuration
base_path: "data"
dataset: "AQUA"
external_knowledge: false
external_knowledge_path: "data/semart.csv"
use_streaming: true
stream_buffer_size: 1000

# Validation settings
use_validation: true                # Enable the use of validation set
eval_batch_size: 4                  # Batch size for evaluation
max_val_samples: 500                # Maximum number of samples for validation (to avoid memory issues)
n_evals: 10                         # Number of evaluations during training (for streaming mode)
save_total_limit: 3                 # Save only the 3 best models during training

# Evaluation metrics
evaluation_metrics:                 # Metrics to calculate during evaluation
  - "bleu"
  - "rouge"
  - "exact_match"                   # "bert" is available but disabled by default (requires more resources)
best_model_metric: "rougeL_fmeasure"  # Metric to use for selecting the best model
greater_is_better: true             # True if higher value is better (e.g. BLEU, ROUGE), False if lower is better (e.g. loss)

# Training hyperparameters
batch_size: 2
grad_accum: 4
epochs: 3
lr: 2e-4
optim: "adamw_8bit"
weight_decay: 0.01
scheduler: "linear"
warmup_steps: 5
logging_steps: 10
max_seq_length: 2048
seed: 3407

# Streaming settings (used only if use_streaming is true)
max_steps: 1000                     # Maximum number of steps for training in streaming mode
n_saves: 5                          # Number of times to save the model during streaming training

# Output settings
output_dir: "outputs"
name_trained_model: "VizSage_final_model"
save_model: true
save_path: "models/trained_model"

# WandB settings
use_wandb: false
wandb_project: "VizSage"
wandb_tags: ["vision-model", "art-historian"]

# Model instructions
instruction: "You are an expert art historian. Answer the questions you will be asked about the image."